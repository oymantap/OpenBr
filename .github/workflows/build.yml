name: Build Open Br Official

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Wrapper
      run: |
        # Pake -fL biar kalo link error langsung stop, gak donlot file zonk
        curl -fLO https://services.gradle.org/distributions/gradle-8.2-bin.zip
        
        # Cek ukuran file sebelum unzip (biar lu tau donlotnya bener apa engga)
        ls -lh gradle-8.2-bin.zip
        
        unzip -q gradle-8.2-bin.zip
        ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Sign APK Manual
      run: |
        # 1. Cari alat tanda tangan terbaru di server
        ZIPALIGN=$(find $ANDROID_HOME/build-tools -name zipalign | sort -V | tail -1)
        APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1)
        
        # 2. Cari file APK hasil rakitan
        APK_FILE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
        
        # 3. Optimasi APK (Zipalign)
        $ZIPALIGN -v 4 "$APK_FILE" OpenBr_signed_temp.apk
        
        # 4. Tanda tangan pake Secret kamu
        echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks
        $APKSIGNER sign --ks release.jks \
          --ks-key-alias "${{ secrets.ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --out OpenBr_Official.apk \
          OpenBr_signed_temp.apk

    - name: Upload Official APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenBr_v17.17
        path: OpenBr_Official.apk
        
