name: Build Open Br Official

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Langkah Sakti: Bikin mesin Gradle otomatis biar gak error Jarfile
    - name: Setup Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease

    # Proses Tanda Tangan (Pakai rahasia yang kamu simpan tadi)
    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}

    # Upload hasil akhir yang sudah resmi
    - name: Upload Official APK
      uses: actions/upload-artifact@v4
      with:
        name: OpenBr_v17.17
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
        
